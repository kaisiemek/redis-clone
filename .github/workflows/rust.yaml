name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
    - uses: actions/checkout@v4
    - name: Lint
      run: cargo clippy -- -D warnings
    - name: Formatting
      run: cargo fmt -- --check
    - name: Build
      run: cargo build --release --verbose
    - name: Run tests
      run: cargo test --verbose

